<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="styles/rock-paper-scissors.css">
</head>
<body>

  <h1 class="title">Rock Paper Scissors</h1>

  <!-- Round selection -->
  <div class="round-select">
    <p>Select Rounds:</p>
    <button onclick="startGame(5)">5 Rounds</button>
    <button onclick="startGame(7)">7 Rounds</button>
  </div>

  <!-- Game area -->
  <div class="game-area hidden">
    <p class="js-round"></p>

    <div class="buttons">
      <button onclick="playGame('rock')" class="move-button">
        <img src="styles/rock-emoji.png" class="move-icon">
      </button>

      <button onclick="playGame('paper')" class="move-button">
        <img src="styles/paper-emoji.png" class="move-icon">
      </button>

      <button onclick="playGame('scissors')" class="move-button">
        <img src="styles/scissors-emoji.png" class="move-icon">
      </button>
    </div>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>
  </div>

  <!-- End screen -->
  <div class="end-screen hidden">
    <h2 class="js-final-result"></h2>
    <button onclick="restartGame()">Restart Game</button>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
