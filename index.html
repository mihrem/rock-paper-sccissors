<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="styles/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

  <h1 class="title">Choose Your Weapon</h1>

  <!-- Round selection -->
  <div class="round-select">
    <button class="rounds" onclick="startGame(5)">5 Rounds</button>
    <button class="rounds" onclick="startGame(7)">7 Rounds</button>
  </div>

  <!-- Game -->
  <div class="game-area hidden">

    <p class="js-round"></p>

    <div class="buttons">
      <button onclick="playGame('rock')" class="move-button rock">
        <img src="images/rock-emoji.png" class="move-icon">
      </button>

      <button onclick="playGame('paper')" class="move-button paper">
        <img src="images/paper-emoji.png" class="move-icon">
      </button>

      <button onclick="playGame('scissors')" class="move-button scissors">
        <img src="images/scissors-emoji.png" class="move-icon">
      </button>
    </div>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

  </div>

  <!-- End screen -->
  
<div class="end-screen hidden">
    <img src="icons/thophy1.png" class="trophy hidden">
    <h2 class="js-final-result"></h2>
     <p class="restart-message">Do you want to play again?</p>

    <button class="restart-btn" onclick="restartGame()">
      <img src="icons/refresh.png" class="restart-icon">
      Restart
    </button>
  </div>

  <script src="scripts/script.js"></script>
</body>
</html>
